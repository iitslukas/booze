<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Booze Cocktails 🍸</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        /* 🔍 DARK SEARCH BAR */
        #search {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            margin-bottom: 20px;

            background: #1e1e1e;
            color: white;

            border-radius: 8px;
            border: 1px solid #333;
            outline: none;
        }

        #search::placeholder {
            color: #888;
        }

        #search:focus {
            border-color: #ffb703;
            box-shadow: 0 0 0 2px rgba(255, 183, 3, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        a.card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            text-decoration: none;
            color: white;
            display: block;
        }

        a.card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 12px;
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .ingredients {
            font-size: 14px;
            color: #bbb;
        }
    </style>
</head>
<body>

<h1>Booze Cocktails 🍹</h1>

<input type="text" id="search" placeholder="Hľadaj cocktail (vodka, gin, rum...)">

<div class="grid" id="cocktailGrid">
    {% for drink in cocktails %}
    <a href="/cocktail/{{ drink.id }}"
       class="card"
       data-name="{{ drink.name | lower }}">

        <img src="{{ drink.image or 'https://via.placeholder.com/300x300?text=No+Image' }}">

        <div class="card-content">
            <h3>{{ drink.name }}</h3>
            <div class="ingredients">
                {% for ing in drink.ingredients %}
                    {{ ing.name }}{% if not loop.last %}, {% endif %}
                {% endfor %}
            </div>
        </div>

    </a>
    {% endfor %}
</div>

<script>
    const search = document.getElementById("search");
    const cards = document.querySelectorAll(".card");

    search.addEventListener("keyup", () => {
        const value = search.value.toLowerCase();

        cards.forEach(card => {
            const name = card.dataset.name;
            card.style.display = name.includes(value) ? "block" : "none";
        });
    });
</script>

</body>
</html>
