<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booze Cocktails 🍸</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        #search {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            margin-bottom: 20px;
            background: #1e1e1e;
            color: white;
            border-radius: 8px;
            border: 1px solid #333;
            outline: none;
        }

        #search::placeholder {
            color: #888;
        }

        #search:focus {
            border-color: #ffb703;
            box-shadow: 0 0 0 2px rgba(255, 183, 3, 0.3);
        }

        .loading {
            text-align: center;
            margin: 30px 0;
            font-size: 18px;
            color: #bbb;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 18px rgba(0,0,0,0.6);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 12px;
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 18px;
            color: #ffb703;
        }

        .ingredients {
            font-size: 14px;
            color: #bbb;
        }

        .empty {
            text-align: center;
            margin-top: 30px;
            color: #888;
        }
    </style>
</head>
<body>

<h1>Booze Cocktails 🍹</h1>

<input type="text" id="search" placeholder="Hľadaj drink alebo ingredienciu (vodka, gin, rum...)">

<div class="loading" id="loading">Načítavam drinky...</div>
<div class="grid" id="cocktailGrid"></div>
<div class="empty" id="emptyMessage" style="display:none;">Žiadne výsledky 😢</div>

<script>
    const grid = document.getElementById("cocktailGrid");
    const search = document.getElementById("search");
    const loading = document.getElementById("loading");
    const emptyMessage = document.getElementById("emptyMessage");

    let cocktails = [];

    async function loadCocktails() {
        try {
            const response = await fetch("https://boozeapi.com/api/v1/cocktails");
            const data = await response.json();

            cocktails = data;
            loading.style.display = "none";

            renderCocktails(cocktails);
        } catch (error) {
            loading.innerText = "Chyba pri načítaní drinkov 😢";
            console.error(error);
        }
    }

    function renderCocktails(list) {
        grid.innerHTML = "";

        if (list.length === 0) {
            emptyMessage.style.display = "block";
            return;
        } else {
            emptyMessage.style.display = "none";
        }

        list.forEach(drink => {
            const card = document.createElement("div");
            card.className = "card";

            const ingredients = drink.ingredients
                ? drink.ingredients.map(i => i.name).join(", ")
                : "Neznáme ingrediencie";

            card.innerHTML = `
                <img src="${drink.image}" alt="${drink.name}">
                <div class="card-content">
                    <h3>${drink.name}</h3>
                    <div class="ingredients">
                        ${ingredients}
                    </div>
                </div>
            `;

            grid.appendChild(card);
        });
    }

    search.addEventListener("input", () => {
        const value = search.value.toLowerCase();

        const filtered = cocktails.filter(drink => {
            const nameMatch = drink.name.toLowerCase().includes(value);

            const ingredientMatch = drink.ingredients
                ? drink.ingredients.some(i =>
                    i.name.toLowerCase().includes(value)
                )
                : false;

            return nameMatch || ingredientMatch;
        });

        renderCocktails(filtered);
    });

    loadCocktails();
</script>

</body>
</html>
