<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Booze Cocktails 🍸</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        #search {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            margin-bottom: 20px;
            background: #1e1e1e;
            color: white;
            border-radius: 8px;
            border: 1px solid #333;
            outline: none;
        }

        #search::placeholder {
            color: #888;
        }

        #search:focus {
            border-color: #ffb703;
            box-shadow: 0 0 0 2px rgba(255, 183, 3, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 12px;
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .ingredients {
            font-size: 14px;
            color: #bbb;
        }
    </style>
</head>
<body>

<h1>Booze Cocktails 🍹</h1>

<input type="text" id="search" placeholder="Hľadaj cocktail (vodka, gin, rum...)">

<div class="grid" id="cocktailGrid"></div>

<script>
    // 🔥 Tu si pridávaš svoje drinky
    const cocktails = [
        {
            id: 1,
            name: "Mojito",
            image: "https://images.unsplash.com/photo-1582571352032-4486c04c09a0",
            ingredients: ["Rum", "Lime", "Mint", "Sugar", "Soda"]
        },
        {
            id: 2,
            name: "Martini",
            image: "https://images.unsplash.com/photo-1575023782549-62ca0d244b39",
            ingredients: ["Gin", "Vermouth"]
        },
        {
            id: 3,
            name: "Whiskey Sour",
            image: "https://images.unsplash.com/photo-1600891964092-4316c288032e",
            ingredients: ["Whiskey", "Lemon", "Sugar"]
        }
    ];

    const grid = document.getElementById("cocktailGrid");
    const search = document.getElementById("search");

    function renderCocktails(list) {
        grid.innerHTML = "";

        list.forEach(drink => {
            const card = document.createElement("div");
            card.className = "card";
            card.dataset.name = drink.name.toLowerCase();

            card.innerHTML = `
                <img src="${drink.image}" alt="${drink.name}">
                <div class="card-content">
                    <h3>${drink.name}</h3>
                    <div class="ingredients">
                        ${drink.ingredients.join(", ")}
                    </div>
                </div>
            `;

            grid.appendChild(card);
        });
    }

    search.addEventListener("keyup", () => {
        const value = search.value.toLowerCase();
        const filtered = cocktails.filter(drink =>
            drink.name.toLowerCase().includes(value)
        );
        renderCocktails(filtered);
    });

    renderCocktails(cocktails);
</script>

</body>
</html>
