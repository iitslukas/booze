        * {

        }

        body {
            margin: 0;

            background: linear-gradient(135deg, #0f0f0f, #1b1b1b);
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 20px;
        }

        #search {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: #1f1f1f;
            color: white;
            font-size: 16px;
            margin-bottom: 30px;
            outline: none;
        }

        #search:focus {
            box-shadow: 0 0 0 2px #ffb703;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 18px;
            color: #ffb703;
        }

        .ingredients {
            font-size: 14px;
            color: #ccc;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #181818;
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                transform: scale(0.85);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .modal-box img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-body h2 {
            margin-top: 0;
            color: #ffb703;
        }

        .modal-body ul {
            padding-left: 18px;
        }

        .close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 28px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            margin-top: 40px;
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>

        function renderCocktails(list) {

            if (!Array.isArray(list)) {
                console.error("renderCocktails nedostal pole:", list);
                return;
            }

            grid.innerHTML = "";

            list.forEach(drink => {
                const card = document.createElement("div");
                card.className = "card";

                const ingredients = Array.isArray(drink.ingredients)
                    ? drink.ingredients.map(i => i.name).join(", ")
                    : "Neznáme ingrediencie";

                card.innerHTML = `
            <img src="${drink.image}" alt="${drink.name}">
            <div class="card-content">
                <h3>${drink.name}</h3>
                <div class="ingredients">${ingredients}</div>
            </div>
        `;

                card.onclick = () => openModal(drink);
                grid.appendChild(card);
            });
        }

        function openModal(drink) {
            const ingredients = Array.isArray(drink.ingredients)
                ? drink.ingredients.map(i => `<li>${i.name}</li>`).join("")
                : "<li>Neznáme ingrediencie</li>";

            modalBox.innerHTML = `
        <img src="${drink.image}" alt="${drink.name}">
        <div class="modal-body">
            <h2>${drink.name}</h2>
            <h4>Ingrediencie:</h4>
            <ul>${ingredients}</ul>
            ${drink.instructions ? `<h4>Postup:</h4><p>${drink.instructions}</p>` : ""}
        </div>
    `;

            modal.classList.add("active");
        }

        function closeModal() {
            modal.classList.remove("active");
        }

        search.addEventListener("input", () => {
            const value = search.value.toLowerCase();

            const filtered = cocktails.filter(drink => {
                const nameMatch = drink.name?.toLowerCase().includes(value);
                const ingredientMatch = Array.isArray(drink.ingredients)
                    ? drink.ingredients.some(i => i.name?.toLowerCase().includes(value))
                    : false;

                return nameMatch || ingredientMatch;
            });

            renderCocktails(filtered);
        });

        modal.addEventListener("click", e => {
            if (e.target === modal) closeModal();
        });

        loadCocktails();
