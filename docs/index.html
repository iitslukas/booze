<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booze Cocktails 🍸</title>

<style>
body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto;
    background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    font-weight:700;
    font-size:32px;
    margin-bottom:20px;
}

#search{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#1f1f1f;
    color:white;
    font-size:16px;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:0.25s;
    border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:0 0 8px;
    font-size:18px;
    color:#ffb703;
}

.ingredients{
    font-size:14px;
    color:#ccc;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:flex;
    align-items:center;
    justify-content:center;
    visibility:hidden;
    opacity:0;
    transition:0.3s;
    padding:20px;
}

.modal.active{
    visibility:visible;
    opacity:1;
}

.modal-content{
    background:#1c1c1c;
    max-width:500px;
    width:100%;
    border-radius:20px;
    overflow:hidden;
    animation:scaleIn 0.3s ease;
}

@keyframes scaleIn{
    from{transform:scale(0.8);opacity:0}
    to{transform:scale(1);opacity:1}
}

.modal img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.modal-body{
    padding:20px;
}

.modal-body h2{
    margin-top:0;
    color:#ffb703;
}

.close{
    position:absolute;
    top:25px;
    right:35px;
    font-size:28px;
    cursor:pointer;
}

.loading{
    text-align:center;
    margin-top:40px;
    font-size:18px;
    color:#aaa;
}
</style>
</head>

<body>

<h1>Booze Cocktails 🍹</h1>

<input type="text" id="search" placeholder="Hľadaj drink alebo ingredienciu...">

<div class="loading" id="loading">Načítavam drinky...</div>
<div class="grid" id="cocktailGrid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="close" onclick="closeModal()">✕</div>
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
const grid = document.getElementById("cocktailGrid");
const search = document.getElementById("search");
const loading = document.getElementById("loading");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

let cocktails = [];

// 🔥 NAČÍTANIE API (CORS FIX)
async function loadCocktails(){
    try{
        const response = await fetch("https://corsproxy.io/?https://boozeapi.com/api/v1/cocktails");
        const data = await response.json();

        cocktails = Array.isArray(data) ? data : data.data || [];

        loading.style.display="none";
        renderCocktails(cocktails);

    }catch(err){
        loading.innerText="Chyba pri načítaní 😢";
        console.error(err);
    }
}

function renderCocktails(list){
    grid.innerHTML="";

    list.forEach(drink=>{
        const card=document.createElement("div");
        card.className="card";

        const ingredients = drink.ingredients
            ? drink.ingredients.map(i=> i.name + (i.amount ? " ("+i.amount+")":"")).join(", ")
            : "Neznáme ingrediencie";

        card.innerHTML=`
            <img src="${drink.image}" alt="${drink.name}">
            <div class="card-content">
                <h3>${drink.name}</h3>
                <div class="ingredients">${ingredients}</div>
            </div>
        `;

        card.onclick=()=>openModal(drink);
        grid.appendChild(card);
    });
}

function openModal(drink){
    const ingredients = drink.ingredients
        ? drink.ingredients.map(i=>`<li>${i.name} ${i.amount ? "- "+i.amount : ""}</li>`).join("")
        : "<li>Neznáme ingrediencie</li>";

    modalContent.innerHTML=`
        <img src="${drink.image}" alt="${drink.name}">
        <div class="modal-body">
            <h2>${drink.name}</h2>
            <h4>Ingrediencie:</h4>
            <ul>${ingredients}</ul>
            ${drink.instructions ? `<h4>Postup:</h4><p>${drink.instructions}</p>`:""}
        </div>
    `;

    modal.classList.add("active");
}

function closeModal(){
    modal.classList.remove("active");
}

search.addEventListener("input",()=>{
    const value=search.value.toLowerCase();

    const filtered=cocktails.filter(drink=>{
        const nameMatch = drink.name.toLowerCase().includes(value);

        const ingredientMatch = drink.ingredients
            ? drink.ingredients.some(i=>i.name.toLowerCase().includes(value))
            : false;

        return nameMatch || ingredientMatch;
    });

    renderCocktails(filtered);
});

modal.addEventListener("click",e=>{
    if(e.target===modal) closeModal();
});

loadCocktails();
</script>

</body>
</html>
