<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Detail Cocktailu</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #121212;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #ffb703;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
        }

        .back-link:hover {
            color: #ffd166;
            transform: translateX(-4px);
        }

        img {
            max-width: 400px;
            width: 100%;
            border-radius: 12px;
            margin: 20px 0;
        }

        h1 {
            margin-top: 0;
        }

        h2, h3 {
            margin-top: 30px;
        }

        ul {
            line-height: 1.8;
            padding-left: 20px;
        }

        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container" id="content">
    <p>Načítavam cocktail...</p>
</div>

<script>
const URL = "https://boozeapi.com/api/v1/cocktails";

function getIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get("id"));
}

async function loadDetail() {
    const id = getIdFromURL();
    const container = document.getElementById("content");

    if (!id) {
        container.innerHTML = "<h1>❌ Neplatné ID</h1>";
        return;
    }

    try {
        const response = await fetch(URL);
        const data = await response.json();
        const cocktails = data.data || data;

        const cocktail = cocktails.find(c => c.id === id);

        if (!cocktail) {
            container.innerHTML = "<h1>404 - Cocktail nenájdený 😢</h1>";
            return;
        }

        document.title = cocktail.name;

        container.innerHTML = `
            <a href="index.html" class="back-link">⬅ Späť na cocktails</a>

            <h1>${cocktail.name}</h1>

            <img src="${cocktail.image || 'https://via.placeholder.com/400x400'}">

            <h2>🧾 Ingrediencie</h2>
            <ul>
                ${cocktail.ingredients.map(ing =>
                    `<li>${ing.measurement || ""} ${ing.name}</li>`
                ).join("")}
            </ul>

            <h2>🍹 Postup</h2>
            <p>
                ${cocktail.instructions || "Postup nie je dostupný 😢"}
            </p>

            ${cocktail.glass ? `
                <h3>🥂 Pohár</h3>
                <p>${cocktail.glass}</p>
            ` : ""}
        `;

    } catch (error) {
        container.innerHTML = "<h1>❌ Chyba pri načítaní dát</h1>";
        console.error(error);
    }
}

loadDetail();
</script>

</body>
</html>
